name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: "Data Scientist Portfolio"
        run: npm install

      - name: Build
        working-directory: "Data Scientist Portfolio"
        run: npm run build

      - name: Check build output
        run: |
          ls -la "Data Scientist Portfolio/dist"
          test -f "Data Scientist Portfolio/dist/index.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Data Scientist Portfolio/dist"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
